[server]
# transformers ships submodules whose __init__ lazily imports torchvision.
# Streamlit's watcher walks sys.modules and probes hasattr(m, "__path__")
# on every entry — that probe triggers the lazy import and floods the
# console with ModuleNotFoundError tracebacks for vision modules we never
# touch. "poll" still walks modules; only "none" stops it entirely.
# Trade-off: lose hot-reload on .py edits — restart the app instead.
fileWatcherType = "none"

[browser]
gatherUsageStats = false
